<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Your Term, Mapped</title>
<meta name="theme-color" content="#1F3B2E" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Term Tracker" />
<link rel="manifest" href='data:application/manifest+json,{"name":"Your Term, Mapped","short_name":"Term Tracker","start_url":".","display":"standalone","background_color":"%231F3B2E","theme_color":"%231F3B2E"}' />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#1F3B2E; --board-dark:#16291F; --chalk:#F3F0E4; --chalk-dim:#B9C6BC;
    --yellow:#E8C468; --coral:#E2725B; --rail:#2A4A3A; --green:#8FD9A8;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--board); font-family:'Inter',sans-serif; color:var(--chalk); -webkit-tap-highlight-color:transparent; }
  .wrap { max-width:640px; margin:0 auto; padding:28px 16px 60px; }
  h1 { font-family:'Kalam',cursive; font-size:34px; margin:0 0 4px; }
  .sub { color:var(--chalk-dim); font-size:13px; margin:0 0 20px; }
  nav { display:flex; gap:4px; border-bottom:1px solid var(--rail); margin-bottom:24px; }
  nav button { flex:1; background:none; border:none; color:var(--chalk-dim); padding:10px 4px 6px; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; display:flex; flex-direction:column; align-items:center; gap:4px; }
  nav button.active { color:var(--chalk); }
  nav svg { width:16px; height:16px; }
  .underline { height:8px; width:60px; }
  .section-head { display:flex; align-items:flex-end; justify-content:space-between; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .section-head h2 { font-family:'Kalam',cursive; font-size:26px; margin:0; }
  .section-head p { color:var(--chalk-dim); font-size:13px; margin:2px 0 0; }
  .btn-add { background:var(--yellow); color:var(--board-dark); border:none; border-radius:6px; padding:8px 14px; font-size:13px; font-weight:500; display:flex; align-items:center; gap:6px; cursor:pointer; }
  .empty { border:1px dashed var(--rail); border-radius:10px; padding:24px; text-align:center; color:var(--chalk-dim); font-size:14px; }
  .card { background:var(--board-dark); border:1px solid var(--rail); border-radius:10px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .card .main { min-width:0; flex:1; display:flex; align-items:center; gap:12px; }
  .tag { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; background:var(--rail); color:var(--yellow); padding:2px 6px; border-radius:4px; }
  .title { font-size:14px; font-weight:500; color:var(--chalk); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--chalk-dim); }
  .del { background:none; border:none; color:var(--chalk-dim); cursor:pointer; padding:4px; }
  .form { background:var(--rail); border:1px dashed var(--chalk-dim); border-radius:10px; padding:14px; margin-bottom:16px; display:grid; gap:10px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  label.field { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--chalk-dim); }
  input, select { background:var(--board-dark); color:var(--chalk); border:1px solid var(--rail); border-radius:6px; padding:7px 8px; font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .form-actions { display:flex; justify-content:flex-end; gap:8px; }
  .btn-ghost { background:none; border:none; color:var(--chalk-dim); font-size:12px; padding:6px 10px; cursor:pointer; }
  .btn-save { background:var(--yellow); color:var(--board-dark); border:none; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:4px; }
  .check-btn { width:20px; height:20px; border:1px solid var(--yellow); border-radius:5px; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .check-btn.done { background:var(--yellow); }
  .bar-bg { height:6px; border-radius:99px; background:var(--rail); margin:6px 0 8px; }
  .bar-fill { height:6px; border-radius:99px; }
  .att-actions button { font-size:12px; padding:5px 10px; border-radius:6px; border:none; margin-right:8px; cursor:pointer; background:var(--rail); }
  .drop { border:1px dashed var(--rail); border-radius:10px; padding:28px; text-align:center; cursor:pointer; }
  .thumbs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .thumb { position:relative; width:76px; height:76px; }
  .thumb img { width:100%; height:100%; object-fit:cover; border-radius:6px; border:1px solid var(--rail); }
  .thumb button { position:absolute; top:-6px; right:-6px; background:var(--coral); border:none; border-radius:99px; width:18px; height:18px; color:var(--chalk); cursor:pointer; font-size:11px; line-height:1; }
  .warn { display:flex; gap:8px; background:var(--rail); border-radius:10px; padding:10px 12px; margin-bottom:12px; font-size:13px; }
  .review-item { display:flex; gap:10px; align-items:flex-start; background:var(--board-dark); border:1px solid var(--rail); border-radius:10px; padding:12px 16px; margin-bottom:8px; cursor:pointer; }
  .note { font-size:12px; color:var(--chalk-dim); margin-bottom:12px; }
  ::selection { background:var(--yellow); color:var(--board-dark); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Your Term, Mapped</h1>
  <p class="sub">Classes, assignments, exams and attendance — kept in one place, saved right here in your browser.</p>
  <nav id="tabs"></nav>
  <div id="content"></div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
</div>

<script>
const STORAGE_KEY = "student-tracker-data-v1";
const API_KEY_STORAGE = "student-tracker-gemini-key-v1";
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_MAP = {monday:"Mon",mon:"Mon",tuesday:"Tue",tue:"Tue",tues:"Tue",wednesday:"Wed",wed:"Wed",thursday:"Thu",thu:"Thu",thurs:"Thu",friday:"Fri",fri:"Fri",saturday:"Sat",sat:"Sat",sunday:"Sun",sun:"Sun"};
const normDay = d => DAY_MAP[(d||"").toLowerCase().trim()] || d || "Mon";
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let state = { timetable:[], assignments:[], exams:[], attendance:[] };
let tab = "timetable";
let draft = null;      // {type, ...fields} for open add-forms
let shots = [];        // {id, dataUrl, mediaType, base64}
let review = [];       // extracted items pending confirm
let extracting = false;
let extractError = "";
let apiKey = localStorage.getItem(API_KEY_STORAGE) || "";
let showKeyInput = false;
let keySavedMsg = "";

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch(e) { /* first run */ }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.error("Save failed", e); }
}

const ICONS = {
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>',
  cap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
  sparkles:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6h12z"/></svg>',
  img:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
};

const TABS = [
  {id:"timetable", label:"Timetable", icon:"calendar"},
  {id:"assignments", label:"Assignments", icon:"list"},
  {id:"exams", label:"Exams", icon:"cap"},
  {id:"attendance", label:"Attendance", icon:"check"},
  {id:"import", label:"AI Import", icon:"sparkles"},
];

function renderTabs() {
  document.getElementById("tabs").innerHTML = TABS.map(t => `
    <button data-tab="${t.id}" class="${tab===t.id?'active':''}">
      <span style="display:flex;align-items:center;gap:6px;">${ICONS[t.icon]}${t.label}</span>
      <span class="underline">${tab===t.id ? '<svg width="60" height="8" viewBox="0 0 60 8"><path d="M2 5 Q 15 1, 30 4 T 58 3" stroke="#E8C468" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>' : ''}</span>
    </button>
  `).join("");
  document.querySelectorAll("#tabs button").forEach(b => b.onclick = () => { tab = b.dataset.tab; draft=null; render(); });
}

function sectionHead(title, sub, addLabel, onAdd) {
  return `<div class="section-head">
    <div><h2>${esc(title)}</h2><p>${esc(sub)}</p></div>
    <button class="btn-add" onclick="${onAdd}">${ICONS.plus}${esc(addLabel)}</button>
  </div>`;
}

function renderTimetable() {
  const sorted = [...state.timetable].sort((a,b)=> DAYS.indexOf(a.day)-DAYS.indexOf(b.day) || (a.start||"").localeCompare(b.start||""));
  let html = sectionHead("Class Timetable", `${state.timetable.length} ${state.timetable.length===1?'class':'classes'} on the board`, "Add class", "openForm('timetable')");
  if (draft && draft.type==='timetable') html += formTimetable();
  html += sorted.length===0 ? `<div class="empty">No classes yet. Add your first one to start filling in the week.</div>` :
    sorted.map(c => `
      <div class="card">
        <div class="main">
          <span class="tag">${esc(c.day)}</span>
          <div style="min-width:0;">
            <div class="title">${esc(c.subject)}</div>
            <div class="meta">${esc(c.start)}–${esc(c.end)}${c.room?` · ${esc(c.room)}`:''}</div>
          </div>
        </div>
        <button class="del" onclick="removeItem('timetable','${c.id}')">${ICONS.trash}</button>
      </div>`).join("");
  return html;
}
function formTimetable() {
  const d = draft;
  return `<div class="form">
    <div class="grid2">
      <label class="field">Day
        <select onchange="draft.day=this.value">
          ${DAYS.map(x=>`<option value="${x}" ${d.day===x?'selected':''}>${x}</option>`).join("")}
        </select>
      </label>
      <label class="field">Subject<input value="${esc(d.subject)}" oninput="draft.subject=this.value" placeholder="e.g. Linear Algebra" /></label>
      <label class="field">Start time<input type="time" value="${esc(d.start)}" oninput="draft.start=this.value" /></label>
      <label class="field">End time<input type="time" value="${esc(d.end)}" oninput="draft.end=this.value" /></label>
      <label class="field">Room / link<input value="${esc(d.room)}" oninput="draft.room=this.value" placeholder="e.g. Block C-204" /></label>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="cancelForm()">Cancel</button>
      <button class="btn-save" onclick="saveTimetable()">Save</button>
    </div>
  </div>`;
}
function saveTimetable(){
  if (!draft.subject) return cancelForm();
  state.timetable.push({id:uid(), day:draft.day||"Mon", start:draft.start||"", end:draft.end||"", subject:draft.subject, room:draft.room||""});
  save(); cancelForm();
}

function renderAssignments() {
  const pending = state.assignments.filter(a=>!a.done).length;
  let html = sectionHead("Assignments", `${pending} pending`, "Add assignment", "openForm('assignments')");
  if (draft && draft.type==='assignments') html += formAssignment();
  const sorted = [...state.assignments].sort((a,b)=>(a.due||"").localeCompare(b.due||""));
  html += sorted.length===0 ? `<div class="empty">Nothing tracked yet. Add a deadline before it sneaks up on you.</div>` :
    sorted.map(a=>`
      <div class="card">
        <div class="main">
          <button class="check-btn ${a.done?'done':''}" onclick="toggleDone('${a.id}')">${a.done?ICONS.check.replace('viewBox="0 0 24 24"','width="12" height="12" viewBox="0 0 24 24"'):''}</button>
          <div style="min-width:0;">
            <div class="title" style="${a.done?'text-decoration:line-through;opacity:.5;':''}">${esc(a.title)}</div>
            <div class="meta">${esc(a.subject)}${a.due?` · due ${esc(a.due)}`:''}</div>
          </div>
        </div>
        <button class="del" onclick="removeItem('assignments','${a.id}')">${ICONS.trash}</button>
      </div>`).join("");
  return html;
}
function formAssignment(){
  const d = draft;
  return `<div class="form">
    <div class="grid2">
      <label class="field">Title<input value="${esc(d.title)}" oninput="draft.title=this.value" placeholder="e.g. Lab report 3" /></label>
      <label class="field">Subject<input value="${esc(d.subject)}" oninput="draft.subject=this.value" placeholder="e.g. Physics" /></label>
      <label class="field">Due date<input type="date" value="${esc(d.due)}" oninput="draft.due=this.value" /></label>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="cancelForm()">Cancel</button>
      <button class="btn-save" onclick="saveAssignment()">Save</button>
    </div>
  </div>`;
}
function saveAssignment(){
  if (!draft.title) return cancelForm();
  state.assignments.push({id:uid(), title:draft.title, subject:draft.subject||"", due:draft.due||"", done:false});
  save(); cancelForm();
}
function toggleDone(id){ const a=state.assignments.find(x=>x.id===id); if(a){a.done=!a.done; save(); render();} }

function renderExams() {
  let html = sectionHead("Exam Schedule", `${state.exams.length} upcoming`, "Add exam", "openForm('exams')");
  if (draft && draft.type==='exams') html += formExam();
  const sorted = [...state.exams].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  html += sorted.length===0 ? `<div class="empty">No exams logged yet.</div>` :
    sorted.map(ex=>`
      <div class="card">
        <div>
          <div class="title">${esc(ex.subject)}</div>
          <div class="meta">${esc(ex.date)}${ex.time?` · ${esc(ex.time)}`:''}${ex.room?` · ${esc(ex.room)}`:''}</div>
        </div>
        <button class="del" onclick="removeItem('exams','${ex.id}')">${ICONS.trash}</button>
      </div>`).join("");
  return html;
}
function formExam(){
  const d = draft;
  return `<div class="form">
    <div class="grid2">
      <label class="field">Subject<input value="${esc(d.subject)}" oninput="draft.subject=this.value" placeholder="e.g. Organic Chemistry" /></label>
      <label class="field">Room / hall<input value="${esc(d.room)}" oninput="draft.room=this.value" placeholder="e.g. Hall 2" /></label>
      <label class="field">Date<input type="date" value="${esc(d.date)}" oninput="draft.date=this.value" /></label>
      <label class="field">Time<input type="time" value="${esc(d.time)}" oninput="draft.time=this.value" /></label>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="cancelForm()">Cancel</button>
      <button class="btn-save" onclick="saveExam()">Save</button>
    </div>
  </div>`;
}
function saveExam(){
  if (!draft.subject) return cancelForm();
  state.exams.push({id:uid(), subject:draft.subject, date:draft.date||"", time:draft.time||"", room:draft.room||""});
  save(); cancelForm();
}

function renderAttendance() {
  let html = sectionHead("Attendance", "Tap present or absent after each class", "Add subject", "openForm('attendance')");
  if (draft && draft.type==='attendance') html += formAttendance();
  html += state.attendance.length===0 ? `<div class="empty">Add a subject to start tracking how many classes you've made.</div>` :
    state.attendance.map(a=>{
      const pct = a.total ? Math.round((a.present/a.total)*100) : 0;
      const ok = pct >= 75;
      const color = ok ? 'var(--green)' : 'var(--coral)';
      return `<div class="card" style="display:block;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span class="title">${esc(a.subject)}</span>
          <span class="meta" style="color:${color};font-weight:600;">${pct}% (${a.present}/${a.total})</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
        <div class="att-actions">
          <button style="color:var(--green);" onclick="markAttendance('${a.id}', true)">Present</button>
          <button style="color:var(--coral);" onclick="markAttendance('${a.id}', false)">Absent</button>
          <button class="del" style="float:right;" onclick="removeItem('attendance','${a.id}')">${ICONS.trash}</button>
        </div>
      </div>`;
    }).join("");
  return html;
}
function formAttendance(){
  return `<div class="form">
    <label class="field">Subject<input value="${esc(draft.subject)}" oninput="draft.subject=this.value" placeholder="e.g. Data Structures" /></label>
    <div class="form-actions">
      <button class="btn-ghost" onclick="cancelForm()">Cancel</button>
      <button class="btn-save" onclick="saveAttendanceSubject()">Save</button>
    </div>
  </div>`;
}
function saveAttendanceSubject(){
  if (!draft.subject) return cancelForm();
  state.attendance.push({id:uid(), subject:draft.subject, present:0, total:0});
  save(); cancelForm();
}
function markAttendance(id, present){
  const a = state.attendance.find(x=>x.id===id);
  if (a){ a.total+=1; if(present) a.present+=1; save(); render(); }
}

function renderImport() {
  let html = sectionHead("AI Import", "Upload portal screenshots and let AI fill things in for you", "Choose images", "document.getElementById('fileInput').click()");

  html += `<div class="form" style="margin-bottom:16px;">
    <label class="field">Your Google AI Studio API key (free)
      <input type="text" value="${esc(apiKey)}" oninput="apiKey=this.value" placeholder="AIza..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    </label>
    <p class="note" style="margin:0;">Saved only on this device. Get a free key at <span style="color:var(--yellow);">aistudio.google.com</span> → Get API key → Create key. No credit card needed.</p>
    <div class="form-actions">
      <button class="btn-save" onclick="saveApiKey()">${ICONS.check}Save key</button>
    </div>
    ${keySavedMsg ? `<p class="note" style="margin:0;color:var(--green);">${esc(keySavedMsg)}</p>` : ""}
  </div>`;
  if (extractError && !shots.length) {
    html += `<div class="warn">${ICONS.warn}<span>${esc(extractError)}</span></div>`;
  }

  html += `<p class="note">Nothing here needs your portal login — just screenshots. Crop out anything you'd rather not share, like your name or ID number, before uploading.</p>`;

  if (shots.length) {
    html += `<div class="thumbs">${shots.map(s=>`
      <div class="thumb"><img src="${s.dataUrl}"/><button onclick="removeShot('${s.id}')">✕</button></div>
    `).join("")}</div>`;
  }
  if (shots.length && review.length===0) {
    html += `<button class="btn-add" style="margin-bottom:16px;" onclick="extractFromShots()" ${extracting?'disabled':''}>
      ${extracting?'Reading screenshots…':ICONS.sparkles+'Extract details'}
    </button>`;
  }
  if (extractError) {
    html += `<div class="warn">${ICONS.warn}<span>${esc(extractError)}</span></div>`;
  }
  if (review.length) {
    html += `<p class="note">Found ${review.length} item${review.length===1?'':'s'} — uncheck anything that's wrong, then save.</p>`;
    html += review.map(item => `
      <div class="review-item" onclick="toggleReview('${item.id}')">
        <input type="checkbox" ${item.selected?'checked':''} onclick="event.stopPropagation(); toggleReview('${item.id}')" style="margin-top:2px;" />
        <div style="min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="tag" style="text-transform:uppercase;font-size:10px;">${esc(item.kind)}</span>
            <span class="title">${esc(item.subject||item.title)}</span>
          </div>
          <div class="meta">
            ${item.kind==='timetable' ? `${normDay(item.day)} · ${esc(item.start)}–${esc(item.end)}${item.room?` · ${esc(item.room)}`:''}` : ''}
            ${item.kind==='assignment' ? `due ${esc(item.due||"—")}` : ''}
            ${item.kind==='exam' ? `${esc(item.date||"—")}${item.time?` · ${esc(item.time)}`:''}${item.room?` · ${esc(item.room)}`:''}` : ''}
          </div>
        </div>
      </div>`).join("");
    html += `<div class="form-actions" style="margin-top:8px;">
      <button class="btn-ghost" onclick="discardReview()">Discard</button>
      <button class="btn-save" onclick="confirmReview()">${ICONS.check}Add to my tracker</button>
    </div>`;
  }
  if (!shots.length && !review.length && !extractError) {
    html += `<div class="drop" onclick="document.getElementById('fileInput').click()">
      <div style="margin-bottom:8px;">${ICONS.img.replace('viewBox="0 0 24 24"','width="28" height="28" viewBox="0 0 24 24"')}</div>
      <p class="meta">Tap to upload one or more screenshots of your timetable, assignments, or exam list</p>
    </div>`;
  }
  return html;
}

function saveApiKey(){
  if (!apiKey || !apiKey.trim()) {
    keySavedMsg = "";
    extractError = "Paste a key into the box first, then tap Save key.";
    render();
    return;
  }
  try {
    localStorage.setItem(API_KEY_STORAGE, apiKey.trim());
    const check = localStorage.getItem(API_KEY_STORAGE);
    if (check === apiKey.trim()) {
      keySavedMsg = "Key saved on this device ✓";
      extractError = "";
    } else {
      keySavedMsg = "";
      extractError = "Save didn't stick — your browser may be blocking storage (private/incognito mode blocks this). Try a normal browser tab.";
    }
  } catch(e) {
    keySavedMsg = "";
    extractError = "Couldn't save the key: " + (e.message || "storage is blocked in this browser.");
  }
  render();
}

function openForm(type){
  const defaults = {timetable:{type,day:"Mon",start:"",end:"",subject:"",room:""}, assignments:{type,title:"",subject:"",due:""}, exams:{type,subject:"",date:"",time:"",room:""}, attendance:{type,subject:""}}[type];
  draft = defaults; render();
}
function cancelForm(){ draft=null; render(); }
function removeItem(section, id){ state[section] = state[section].filter(x=>x.id!==id); save(); render(); }

function removeShot(id){ shots = shots.filter(s=>s.id!==id); render(); }
function toggleReview(id){ review = review.map(r=> r.id===id ? {...r, selected:!r.selected} : r); render(); }
function discardReview(){ review=[]; shots=[]; render(); }
function confirmReview(){
  const chosen = review.filter(x=>x.selected);
  chosen.filter(x=>x.kind==='timetable').forEach(x=> state.timetable.push({id:uid(), day:normDay(x.day), start:x.start||"", end:x.end||"", subject:x.subject||"", room:x.room||""}));
  chosen.filter(x=>x.kind==='assignment').forEach(x=> state.assignments.push({id:uid(), title:x.title||"", subject:x.subject||"", due:x.due||"", done:false}));
  chosen.filter(x=>x.kind==='exam').forEach(x=> state.exams.push({id:uid(), subject:x.subject||"", date:x.date||"", time:x.time||"", room:x.room||""}));
  save(); review=[]; shots=[]; render();
}

document.getElementById("fileInput").onchange = (e) => {
  const files = Array.from(e.target.files||[]);
  let remaining = files.length;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const m = dataUrl.match(/^data:(.*?);base64,(.*)$/);
      shots.push({id:uid(), dataUrl, mediaType: m?m[1]:file.type, base64: m?m[2]:""});
      remaining--;
      if (remaining===0) render();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = "";
};

async function extractFromShots(){
  if (!shots.length) return;
  if (!apiKey) {
    extractError = "Add your free Google AI Studio API key above first, then tap Save key.";
    render();
    return;
  }
  extracting = true; extractError=""; review=[]; render();
  try {
    const promptText =
      "These are screenshots from a student portal (timetable, assignments, or exam schedule pages). " +
      "Extract every entry you can find and return ONLY a JSON array (no markdown fences, no commentary). " +
      "Each element must be one of these shapes:\n" +
      '{"kind":"timetable","day":"Mon".."Sun","start":"HH:MM","end":"HH:MM","subject":"...","room":"..."}\n' +
      '{"kind":"assignment","title":"...","subject":"...","due":"YYYY-MM-DD"}\n' +
      '{"kind":"exam","subject":"...","date":"YYYY-MM-DD","time":"HH:MM","room":"..."}\n' +
      "Use empty string for any field you cannot read. If you genuinely cannot find any relevant information, return [].";

    const parts = [
      { text: promptText },
      ...shots.map(s => ({ inline_data: { mime_type: s.mediaType, data: s.base64 } }))
    ];

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${encodeURIComponent(apiKey)}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ role: "user", parts }] })
      }
    );
    const data = await response.json();
    if (data.error) {
      extractError = "Gemini API error: " + (data.error.message || "check that your key is correct.");
      return;
    }
    const text = ((data.candidates||[])[0]?.content?.parts||[]).map(p=>p.text||"").join("");
    const clean = text.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);
    if (!Array.isArray(parsed) || parsed.length===0) {
      extractError = "Couldn't find any timetable, assignment, or exam details in those images. Try a clearer screenshot.";
    } else {
      review = parsed.map(item => ({id:uid(), selected:true, ...item}));
    }
  } catch(e) {
    extractError = "Something went wrong reaching the API. Check your internet connection and that your key is correct.";
  } finally {
    extracting = false; render();
  }
}

function render(){
  renderTabs();
  const map = {timetable:renderTimetable, assignments:renderAssignments, exams:renderExams, attendance:renderAttendance, import:renderImport};
  document.getElementById("content").innerHTML = map[tab]();
}

load();
render();
</script>
